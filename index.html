<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玛瑙的小站 - 严重不完美订单报表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: #f5f5f7;
  min-height: 100vh;
  padding: 0 20px 40px;
}
.site-bar {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  margin-bottom: 32px;
}
.site-bar .site-logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #e85d4a, #c0392b);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  box-shadow: 0 2px 8px rgba(232,93,74,0.3);
}
.site-bar .site-logo::after {
  content: '';
  width: 10px;
  height: 10px;
  background: #fff;
  border-radius: 50%;
}
.site-bar .site-name {
  font-size: 16px;
  font-weight: 700;
  color: #1d1d1f;
  letter-spacing: 0.3px;
}
.container {
  max-width: 800px;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1d1d1f;
  margin-bottom: 8px;
}
.header p {
  font-size: 15px;
  color: #86868b;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px 20px;
  text-align: center;
  text-decoration: none;
  color: #1d1d1f;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.2s ease;
  border: 1px solid rgba(0,0,0,0.04);
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  border-color: rgba(0,122,255,0.3);
}
.card .date-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #ff3b30, #ff6b6b);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
}
.card .date-label {
  font-size: 15px;
  font-weight: 600;
  color: #1d1d1f;
}
.card .date-sub {
  font-size: 12px;
  color: #86868b;
  margin-top: 4px;
}
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 13px;
  color: #86868b;
}
</style>
</head>
<body>
<div class="site-bar"><div class="site-logo"></div><span class="site-name">玛瑙的小站</span></div>
<div class="container">
  <div class="header">
    <h1>严重不完美订单报表</h1>
    <p>选择日期查看对应报表</p>
  </div>
  <div class="cards" id="cards"></div>
  <div class="footer">数据来源：观星台</div>
</div>
<script>
// Report list - add new dates here
const reports = [
  { date: '0511', month: '5', day: '11' },
  { date: '0510', month: '5', day: '10' },
  { date: '0509', month: '5', day: '9' },
  { date: '0508', month: '5', day: '8' },
  { date: '0507', month: '5', day: '7' },
  { date: '0506', month: '5', day: '6' },
  { date: '0505', month: '5', day: '5' },
];

const container = document.getElementById('cards');
reports.forEach(r => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = r.date + '.html';
  a.innerHTML = `
    <div class="date-icon">${r.month}/${r.day}</div>
    <div class="date-label">${r.month}月${r.day}日</div>
    <div class="date-sub">点击查看报表</div>
  `;
  container.appendChild(a);
});
</script>
</body>
</html>
