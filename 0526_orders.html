eriod": "午高峰"}, {"order_id": "5626601038725163760", "rider": "王智宏", "station": "麻豆人-番禺区大学城站（高校配送）", "biz": "阮畅", "monitor": "张勇", "period": "午高峰"}, {"order_id": "5626601108621667018", "rider": "王昱含", "station": "麻豆人-番禺区大学城站（高校配送）", "biz": "阮畅", "monitor": "张勇", "period": "午高峰"}, {"order_id": "5626601357884860761", "rider": "丘春峰", "station": "麻豆人-番禺区大学城站（高校配送）", "biz": "阮畅", "monitor": "张勇", "period": "晚高峰"}];
const PAGE_SIZE = 50;
let state = { sortKey: null, sortDir: 1, page: 1, filtered: DATA };

function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function initFilters() {
  const stations = uniq(DATA.map(d => d.station));
  const periods = uniq(DATA.map(d => d.period));
  const bizs = uniq(DATA.map(d => d.biz));
  const mons = uniq(DATA.map(d => d.monitor));
  function fill(id, list) {
    const sel = document.getElementById(id);
    list.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
  }
  fill('f-station', stations);
  fill('f-period', periods);
  fill('f-biz', bizs);
  fill('f-monitor', mons);
  document.getElementById('kpi-total').textContent = DATA.length;
  document.getElementById('kpi-rider').textContent = uniq(DATA.map(d => d.rider)).length;
  document.getElementById('kpi-station').textContent = stations.length;
}

function applyFilters() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const fs = document.getElementById('f-station').value;
  const fp = document.getElementById('f-period').value;
  const fb = document.getElementById('f-biz').value;
  const fm = document.getElementById('f-monitor').value;
  state.filtered = DATA.filter(d => {
    if (fs && d.station !== fs) return false;
    if (fp && d.period !== fp) return false;
    if (fb && d.biz !== fb) return false;
    if (fm && d.monitor !== fm) return false;
    if (q) {
      const hay = (d.order_id + d.rider + d.station + d.biz + d.monitor + d.period).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  if (state.sortKey) sortRows(state.sortKey, state.sortDir, false);
  state.page = 1;
  render();
}

function sortRows(key, dir, toggle) {
  if (toggle) {
    if (state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = 1; }
  }
  state.filtered.sort((a, b) => {
    const av = a[key] || '', bv = b[key] || '';
    if (av < bv) return -1 * state.sortDir;
    if (av > bv) return 1 * state.sortDir;
    return 0;
  });
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.key === state.sortKey) th.classList.add(state.sortDir > 0 ? 'sort-asc' : 'sort-desc');
  });
  if (toggle) render();
}

function render() {
  const tbody = document.getElementById('tbody');
  const rows = state.filtered;
  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * PAGE_SIZE;
  const slice = rows.slice(start, start + PAGE_SIZE);
  if (slice.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">无匹配数据</td></tr>';
  } else {
    tbody.innerHTML = slice.map(d => {
      const biz = d.biz ? `<span class="badge b-biz">@${d.biz}</span>` : '<span style="color:#c5c5c7">-</span>';
      const mon = d.monitor ? `<span class="badge b-mon">@${d.monitor}</span>` : '<span style="color:#c5c5c7">-</span>';
      return `<tr>
        <td><span class="order-id">${d.order_id}</span></td>
        <td>${d.rider || '-'}</td>
        <td>${d.station || '-'}</td>
        <td>${biz}</td>
        <td>${mon}</td>
        <td>${d.period || '-'}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('count').textContent = `${total} / ${DATA.length} 条`;
  renderPager(totalPages);
}

function renderPager(totalPages) {
  const p = document.getElementById('pager');
  if (totalPages <= 1) { p.innerHTML = ''; return; }
  let html = '';
  html += `<button ${state.page<=1?'disabled':''} data-p="${state.page-1}">上一页</button>`;
  const win = 2;
  let pages = new Set([1, totalPages, state.page]);
  for (let i = -win; i <= win; i++) { if (state.page + i > 1 && state.page + i < totalPages) pages.add(state.page + i); }
  let prev = 0;
  [...pages].sort((a,b)=>a-b).forEach(pg => {
    if (pg - prev > 1) html += '<span class="info">...</span>';
    html += `<button class="${pg===state.page?'active':''}" data-p="${pg}">${pg}</button>`;
    prev = pg;
  });
  html += `<button ${state.page>=totalPages?'disabled':''} data-p="${state.page+1}">下一页</button>`;
  html += `<span class="info">第 ${state.page} / ${totalPages} 页</span>`;
  p.innerHTML = html;
  p.querySelectorAll('button[data-p]').forEach(b => b.onclick = () => { state.page = parseInt(b.dataset.p); render(); });
}

function exportCSV() {
  const headers = ['订单ID', '骑手姓名', '站点名称', '对接人', '站长', '时段'];
  const rows = state.filtered.map(d => [d.order_id, d.rider, d.station, d.biz, d.monitor, d.period]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${(c+'').replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '0526订单明细.csv';
  a.click();
}

document.querySelectorAll('thead th[data-key]').forEach(th => {
  th.onclick = () => sortRows(th.dataset.key, 1, true);
});
['q', 'f-station', 'f-period', 'f-biz', 'f-monitor'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('btn-reset').onclick = () => {
  document.getElementById('q').value = '';
  document.getElementById('f-station').value = '';
  document.getElementById('f-period').value = '';
  document.getElementById('f-biz').value = '';
  document.getElementById('f-monitor').value = '';
  state.sortKey = null; state.sortDir = 1;
  applyFilters();
};
document.getElementById('btn-export').onclick = exportCSV;

initFilters();
applyFilters();
</script>
